<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexMeet — In Meeting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    /* ============================================
       NexMeet — Global Styles
       ============================================ */

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #6c63ff;
      --primary-dark: #5548e8;
      --primary-light: #8b85ff;
      --accent: #00d2ff;
      --danger: #ff4757;
      --success: #2ed573;
      --warning: #ffa502;
      --bg-dark: #0a0a0f;
      --bg-card: #12121a;
      --bg-card2: #1a1a26;
      --border: rgba(255,255,255,0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.6);
      --text-muted: rgba(255,255,255,0.35);
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .room-body {
      background: #0d0d14;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Room Header */
    .room-header {
      height: 56px;
      background: rgba(13,13,20,0.95);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
    }

    .room-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 16px;
    }

    .logo-icon-sm {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: white;
    }

    .room-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .room-code-display {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-secondary);
    }

    .copy-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 2px;
      transition: color var(--transition);
    }

    .copy-btn:hover {
      color: var(--primary-light);
    }

    .recording-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,71,87,0.15);
      border: 1px solid rgba(255,71,87,0.4);
      color: var(--danger);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .rec-dot {
      width: 7px;
      height: 7px;
      background: var(--danger);
      border-radius: 50%;
      animation: recPulse 1s ease-in-out infinite;
    }

    @keyframes recPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .timer {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    .participant-count {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Room Layout */
    .room-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Video Section */
    .video-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
      overflow: hidden;
    }

    /* Video Grid */
    .video-grid {
      flex: 1;
      display: grid;
      gap: 10px;
      overflow: hidden;
      align-content: center;
      justify-content: center;
    }

    .video-grid.solo {
      grid-template-columns: 1fr;
      max-width: 800px;
      margin: auto;
      width: 100%;
    }

    .video-grid.duo {
      grid-template-columns: repeat(2, 1fr);
    }

    .video-grid.trio {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }

    .video-grid.quad {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }

    .video-grid.many {
      grid-template-columns: repeat(3, 1fr);
    }

    /* Video Tile */
    .video-tile {
      position: relative;
      background: var(--bg-card2);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: border-color var(--transition);
      aspect-ratio: 16/9;
    }

    .video-tile:hover {
      border-color: rgba(255,255,255,0.15);
    }

    .video-tile.speaking {
      border-color: var(--success);
      box-shadow: 0 0 0 2px rgba(46,213,115,0.3);
    }

    .video-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%, transparent 70%, rgba(0,0,0,0.3) 100%);
      pointer-events: none;
    }

    .user-label {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .tile-indicators {
      align-self: flex-end;
      display: flex;
      gap: 6px;
    }

    .indicator {
      width: 26px;
      height: 26px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--success);
    }

    .indicator.muted {
      color: var(--danger);
    }

    .no-video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--bg-card2);
    }

    .avatar-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: white;
    }

    .no-video-placeholder span {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* YouTube Panel */
    .youtube-panel {
      height: 280px;
      background: var(--bg-card);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .yt-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .yt-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .yt-controls-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      margin-left: 20px;
    }

    .yt-url-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      font-family: inherit;
      font-size: 13px;
      padding: 7px 12px;
      outline: none;
      transition: border-color var(--transition);
    }

    .yt-url-input:focus {
      border-color: var(--primary);
    }

    .yt-url-input::placeholder {
      color: var(--text-muted);
    }

    .btn-yt-load {
      background: #ff0000;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background var(--transition);
      white-space: nowrap;
    }

    .btn-yt-load:hover {
      background: #cc0000;
    }

    .btn-yt-close {
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background var(--transition);
    }

    .btn-yt-close:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .yt-embed-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #ytPlayer {
      width: 100%;
      height: 100%;
    }

    .yt-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(0,0,0,0.3);
    }

    .yt-placeholder i {
      font-size: 48px;
      color: rgba(255,0,0,0.5);
    }

    .yt-placeholder p {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      max-width: 300px;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width var(--transition);
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: 0;
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 14px 10px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      position: relative;
      border-bottom: 2px solid transparent;
    }

    .sidebar-tab:hover {
      color: var(--text-primary);
      background: rgba(255,255,255,0.03);
    }

    .sidebar-tab.active {
      color: var(--primary-light);
      border-bottom-color: var(--primary);
    }

    .unread-badge {
      position: absolute;
      top: 8px;
      right: 14px;
      background: var(--danger);
      color: white;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .sidebar-content {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-content.active {
      display: flex;
    }

    /* Chat */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 100px;
    }

    .chat-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 20px;
      text-align: center;
    }

    .chat-welcome i {
      font-size: 28px;
      opacity: 0.4;
    }

    .chat-msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeInUp 0.2s ease;
    }

    .chat-msg-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .chat-msg-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--primary-light);
    }

    .chat-msg-name.own {
      color: var(--accent);
    }

    .chat-msg-time {
      font-size: 10px;
      color: var(--text-muted);
    }

    .chat-msg-bubble {
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
      border: 1px solid rgba(255,255,255,0.05);
      color: var(--text-primary);
    }

    .chat-msg.own .chat-msg-bubble {
      background: rgba(108,99,255,0.2);
      border-color: rgba(108,99,255,0.25);
    }

    .chat-input-area {
      display: flex;
      gap: 8px;
      padding: 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      font-family: inherit;
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: border-color var(--transition);
    }

    .chat-input:focus {
      border-color: var(--primary);
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .chat-send-btn {
      width: 38px;
      height: 38px;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background var(--transition);
      flex-shrink: 0;
    }

    .chat-send-btn:hover {
      background: var(--primary-dark);
    }

    /* Participants */
    .participants-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .participant-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      border: 1px solid var(--border);
      animation: fadeInUp 0.2s ease;
    }

    .participant-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .participant-info {
      flex: 1;
      min-width: 0;
    }

    .participant-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .participant-status {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .participant-icons {
      display: flex;
      gap: 4px;
    }

    .p-icon {
      font-size: 11px;
      color: var(--text-muted);
      padding: 3px;
    }

    .p-icon.active {
      color: var(--success);
    }

    .p-icon.muted {
      color: var(--danger);
    }

    /* Control Bar */
    .control-bar {
      height: 72px;
      background: rgba(10,10,15,0.95);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
      gap: 16px;
    }

    .controls-left,
    .controls-center,
    .controls-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .ctrl-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      border-radius: 12px;
      padding: 8px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      transition: all var(--transition);
      min-width: 58px;
    }

    .ctrl-btn i {
      font-size: 18px;
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }

    .ctrl-btn.active {
      background: rgba(108,99,255,0.25);
      border-color: rgba(108,99,255,0.5);
      color: var(--primary-light);
    }

    .ctrl-btn.inactive {
      background: rgba(255,71,87,0.15);
      border-color: rgba(255,71,87,0.3);
      color: var(--danger);
    }

    .ctrl-btn.recording {
      background: rgba(255,71,87,0.2);
      border-color: rgba(255,71,87,0.5);
      color: var(--danger);
      animation: recordingGlow 2s ease infinite;
    }

    @keyframes recordingGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.3); }
      50% { box-shadow: 0 0 0 4px rgba(255,71,87,0.1); }
    }

    .ctrl-btn-danger {
      background: rgba(255,71,87,0.15) !important;
      border-color: rgba(255,71,87,0.35) !important;
      color: var(--danger) !important;
    }

    .ctrl-btn-danger:hover {
      background: var(--danger) !important;
      color: white !important;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      animation: fadeIn 0.2s ease;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .modal-icon {
      font-size: 40px;
      color: var(--danger);
      margin-bottom: 16px;
    }

    .modal h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 20px rgba(108,99,255,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(108,99,255,0.5);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: rgba(255,255,255,0.06);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #ff2f42;
      transform: translateY(-1px);
    }

    .modal-actions .btn {
      flex: 1;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-card2);
      border: 1px solid var(--border);
      color: white;
      padding: 12px 22px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { border-color: rgba(46,213,115,0.4); color: var(--success); }
    .toast.error   { border-color: rgba(255,71,87,0.4);  color: var(--danger); }
    .toast.info    { border-color: rgba(108,99,255,0.4); color: var(--primary-light); }

    /* Raise Hand Popup */
    .raise-hand-popup {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,160,2,0.15);
      border: 1px solid rgba(255,160,2,0.4);
      color: var(--warning);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 150;
      animation: popIn 0.3s ease;
      backdrop-filter: blur(8px);
    }

    @keyframes popIn {
      from { transform: translateX(-50%) scale(0.8); opacity: 0; }
      to   { transform: translateX(-50%) scale(1); opacity: 1; }
    }

    /* Scrollbar global */
    *::-webkit-scrollbar { width: 4px; height: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 100px; }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .controls-center { position: static; transform: none; }
      .control-bar { justify-content: center; }
      .controls-left, .controls-right { display: none; }
      .ctrl-btn span { display: none; }
      .ctrl-btn { min-width: 46px; padding: 8px; }
    }
  </style>
</head>
<body class="room-body">

  <!-- Top Bar -->
  <header class="room-header">
    <div class="room-brand">
      <div class="logo-icon-sm"><i class="fas fa-video"></i></div>

        <i class="fas fa-door-open"></i>

      <div class="recording-indicator" id="recordingIndicator" style="display:none">
        <span class="rec-dot"></span>
        <span>REC</span>

  <!-- Main Layout -->
  <div class="room-layout" id="roomLayout">

    <!-- Video Grid -->

          <div class="video-overlay">
            <div class="user-label">
              <i class="fas fa-user-circle"></i>

            </div>
            <div class="tile-indicators">

              </span>
            </div>
          </div>
          <div class="no-video-placeholder" id="localNoVideo" style="display:none">
            <div class="avatar-placeholder" id="localAvatar">Y</div>

      <!-- YouTube Panel (hidden by default) -->
      <div class="youtube-panel" id="youtubePanel" style="display:none">
        <div class="yt-panel-header">

        <div class="yt-embed-container">

    <!-- Right Sidebar -->
    <div class="sidebar" id="sidebar">

      <!-- Sidebar Tabs -->
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="chat" id="chatTab">
          <i class="fas fa-comment-dots"></i>
          <span>Chat</span>

        <button class="sidebar-tab" data-tab="participants" id="participantsTab">
          <i class="fas fa-users"></i>

      <!-- Chat Panel -->
      <div class="sidebar-content active" id="chatPanel">
        <div class="chat-messages" id="chatMessages">

        <div class="chat-input-area">
          <input
            type="text"
            id="chatInput"
            placeholder="Send a message..."
            class="chat-input"
            maxlength="300"

      <!-- Participants Panel -->

  </div>

  <!-- Control Bar -->
  <footer class="control-bar">
    <div class="controls-left">
      <button class="ctrl-btn" id="toggleAudioBtn" title="Toggle Microphone">

      </button>
      <button class="ctrl-btn" id="toggleVideoBtn" title="Toggle Camera">
        <i class="fas fa-video"></i>
        <span>Stop Video</span>
      </button>
    </div>

    <div class="controls-center">
      <button class="ctrl-btn" id="screenShareBtn" title="Share Screen">
        <i class="fas fa-desktop"></i>
        <span>Share Screen</span>
      </button>
      <button class="ctrl-btn" id="youtubePanelBtn" title="YouTube Co-Watch">
        <i class="fab fa-youtube"></i>
        <span>YouTube</span>
      </button>
      <button class="ctrl-btn" id="recordBtn" title="Record Session">
        <i class="fas fa-record-vinyl"></i>
        <span>Record</span>
      </button>
      <button class="ctrl-btn" id="raiseHandBtn" title="Raise Hand">
        <i class="fas fa-hand-paper"></i>
        <span>Raise Hand</span>
      </button>
    </div>

    <div class="controls-right">
      <button class="ctrl-btn" id="sidebarToggleBtn" title="Toggle Sidebar">
        <i class="fas fa-comments"></i>
        <span>Chat</span>
      </button>
      <button class="ctrl-btn ctrl-btn-danger" id="leaveBtn" title="Leave Meeting">
        <i class="fas fa-phone-slash"></i>
        <span>Leave</span>
      </button>
    </div>
  </footer>

  <!-- Modals & Overlays -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal" id="leaveModal">
      <div class="modal-icon"><i class="fas fa-phone-slash"></i></div>
      <h3>Leave Meeting?</h3>
      <p>Are you sure you want to leave this meeting?</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancelLeave">Stay</button>
        <button class="btn btn-danger" id="confirmLeave">Leave</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Hand Raise Notification -->
  <div class="raise-hand-popup" id="raiseHandPopup" style="display:none">
    <i class="fas fa-hand-paper"></i>
    <span id="raiseHandText"></span>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    /* =============================================
       NexMeet — Room Logic (Complete)
       WebRTC + Socket.io + Recording + YT Co-watch
       ============================================= */

    const socket = io();

    console.log("🔌 Attempting to connect to Socket.io...");
    socket.on("connect", () => {
      console.log("✅ Socket.io connected:", socket.id);
    });
    socket.on("disconnect", (reason) => {
      console.warn("❌ Socket.io disconnected:", reason);
    });
    socket.on("connect_error", (error) => {
      console.error("❌ Socket.io connection error:", error);
    });

    // ── State ─────────────────────────────────────
    const state = {
      roomId: window.location.pathname.split("/").pop(),
      userName: sessionStorage.getItem("userName") || "Guest",
      localStream: null,
      screenStream: null,
      peers: new Map(),
      peerStreams: new Map(),
      peerNames: new Map(),
      isAudioMuted: false,
      isVideoOff: false,
      isSharingScreen: false,
      isRecording: false,
      mediaRecorder: null,
      recordedChunks: [],
      callStartTime: null,
      timerInterval: null,
      unreadCount: 0,
      sidebarOpen: true,
      ytPlayer: null,
      ytPlayerReady: false,
      ytSyncing: false,
    };

    // ── ICE Servers (STUN) ─────────────────────────
    const iceServers = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        { urls: "stun:stun2.l.google.com:19302" },
      ],
    };

    // ── DOM References ─────────────────────────────
    const els = {
      localVideo:         document.getElementById("localVideo"),
      localNoVideo:       document.getElementById("localNoVideo"),
      localAvatar:        document.getElementById("localAvatar"),
      localAvatarName:    document.getElementById("localAvatarName"),
      localUserLabel:     document.getElementById("localUserLabel"),
      localMicIndicator:  document.getElementById("localMicIndicator"),
      videoGrid:          document.getElementById("videoGrid"),
      roomCodeDisplay:    document.getElementById("roomCodeDisplay"),
      recordingIndicator: document.getElementById("recordingIndicator"),
      callTimer:          document.getElementById("callTimer"),
      participantCount:   document.getElementById("participantCount"),
      toggleAudioBtn:     document.getElementById("toggleAudioBtn"),
      toggleVideoBtn:     document.getElementById("toggleVideoBtn"),
      screenShareBtn:     document.getElementById("screenShareBtn"),
      youtubePanelBtn:    document.getElementById("youtubePanelBtn"),
      recordBtn:          document.getElementById("recordBtn"),
      raiseHandBtn:       document.getElementById("raiseHandBtn"),
      sidebarToggleBtn:   document.getElementById("sidebarToggleBtn"),
      leaveBtn:           document.getElementById("leaveBtn"),
      sidebar:            document.getElementById("sidebar"),
      chatMessages:       document.getElementById("chatMessages"),
      chatInput:          document.getElementById("chatInput"),
      chatSendBtn:        document.getElementById("chatSendBtn"),
      participantsList:   document.getElementById("participantsList"),
      youtubePanel:       document.getElementById("youtubePanel"),
      ytUrlInput:         document.getElementById("ytUrlInput"),
      ytLoadBtn:          document.getElementById("ytLoadBtn"),
      ytCloseBtn:         document.getElementById("ytCloseBtn"),
      ytPlaceholder:      document.getElementById("ytPlaceholder"),
      copyRoomCode:       document.getElementById("copyRoomCode"),
      modalOverlay:       document.getElementById("modalOverlay"),
      cancelLeave:        document.getElementById("cancelLeave"),
      confirmLeave:       document.getElementById("confirmLeave"),
      toast:              document.getElementById("toast"),
      raiseHandPopup:     document.getElementById("raiseHandPopup"),
      raiseHandText:      document.getElementById("raiseHandText"),
      unreadBadge:        document.getElementById("unreadBadge"),
      chatTab:            document.getElementById("chatTab"),
      participantsTab:    document.getElementById("participantsTab"),
      chatPanel:          document.getElementById("chatPanel"),
      participantsPanel:  document.getElementById("participantsPanel"),
    };

    // ── Init ───────────────────────────────────────
    async function init() {
      if (!state.userName || state.userName === "Guest") {
        const name = prompt("Enter your display name:") || "Guest";
        state.userName = name;
        sessionStorage.setItem("userName", name);
      }

      els.roomCodeDisplay.textContent = state.roomId;
      els.localUserLabel.textContent = "You (" + state.userName + ")";
      els.localAvatar.textContent = state.userName.charAt(0).toUpperCase();
      els.localAvatarName.textContent = state.userName;

      try {
        console.log("📷 Requesting camera and microphone access...");
        state.localStream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: { echoCancellation: true, noiseSuppression: true },
        });
        els.localVideo.srcObject = state.localStream;
        console.log("✅ Camera & microphone access granted");
        showToast("Camera & microphone ready", "success");
      } catch (err) {
        console.warn("⚠️ Media error:", err);
        showToast("Could not access camera/mic — joining audio-only", "info");
        try {
          console.log("🎤 Requesting audio-only access...");
          state.localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          console.log("✅ Audio-only access granted");
        } catch (e) {
          console.error("❌ No media access available:", e);
          state.localStream = new MediaStream();
        }
        setVideoOff(true);
      }

      socket.emit("join-room", { roomId: state.roomId, userName: state.userName });
      addParticipant("local", state.userName, true);
      startCallTimer();
      updateGridLayout();
    }

    // ── Timer ──────────────────────────────────────
    function startCallTimer() {
      state.callStartTime = Date.now();
      state.timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - state.callStartTime) / 1000);
        const m = String(Math.floor(elapsed / 60)).padStart(2, "0");
        const s = String(elapsed % 60).padStart(2, "0");
        els.callTimer.textContent = `${m}:${s}`;
      }, 1000);
    }

    // ── Grid Layout ────────────────────────────────
    function updateGridLayout() {
      const count = state.peers.size + 1;
      const grid = els.videoGrid;
      grid.className = "video-grid";
      if (count === 1) grid.classList.add("solo");
      else if (count === 2) grid.classList.add("duo");
      else if (count <= 4) grid.classList.add("quad");
      else grid.classList.add("many");

      els.participantCount.innerHTML = `<i class="fas fa-users"></i> ${count}`;
    }

    // ── WebRTC: Create Peer ─────────────────────────
    function createPeer(remoteSocketId, isInitiator) {
      const pc = new RTCPeerConnection(iceServers);

      state.localStream.getTracks().forEach((track) => {
        pc.addTrack(track, state.localStream);
      });

      pc.onicecandidate = ({ candidate }) => {
        if (candidate) {
          socket.emit("ice-candidate", {
            to: remoteSocketId,
            from: socket.id,
            candidate,
          });
        }
      };

      pc.ontrack = ({ streams }) => {
        if (streams && streams[0]) {
          state.peerStreams.set(remoteSocketId, streams[0]);
          const tile = document.getElementById(`tile-${remoteSocketId}`);
          if (tile) {
            const video = tile.querySelector("video");
            if (video) video.srcObject = streams[0];
          }
        }
      };

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === "failed" || pc.connectionState === "disconnected") {
          console.warn(`Peer ${remoteSocketId} disconnected`);
        }
      };

      if (isInitiator) {
        pc.onnegotiationneeded = async () => {
          try {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit("offer", {
              to: remoteSocketId,
              from: socket.id,
              offer,
              userName: state.userName,
            });
          } catch (err) {
            console.error("Offer error:", err);
          }
        };
      }

      state.peers.set(remoteSocketId, pc);
      return pc;
    }

    // ── Remote Tile ─────────────────────────────────
    function addRemoteTile(socketId, userName) {
      const tile = document.createElement("div");
      tile.className = "video-tile";
      tile.id = `tile-${socketId}`;

      const initial = userName.charAt(0).toUpperCase();

      tile.innerHTML = `
        <video autoplay playsinline></video>
        <div class="video-overlay">
          <div class="user-label">
            <i class="fas fa-user-circle"></i>
            <span>${userName}</span>
          </div>
          <div class="tile-indicators">
            <span class="indicator" id="mic-${socketId}" title="Mic on">
              <i class="fas fa-microphone"></i>
            </span>
          </div>
        </div>
        <div class="no-video-placeholder" id="noVideo-${socketId}" style="display:none">
          <div class="avatar-placeholder">${initial}</div>
          <span>${userName}</span>
        </div>
      `;

      els.videoGrid.appendChild(tile);
      updateGridLayout();

      if (state.peerStreams.has(socketId)) {
        tile.querySelector("video").srcObject = state.peerStreams.get(socketId);
      }
    }

    function removeRemoteTile(socketId) {
      const tile = document.getElementById(`tile-${socketId}`);
      if (tile) tile.remove();
      state.peers.delete(socketId);
      state.peerStreams.delete(socketId);
      state.peerNames.delete(socketId);
      updateGridLayout();
    }

    // ── Participant List ────────────────────────────
    function addParticipant(socketId, userName, isLocal = false) {
      const item = document.createElement("div");
      item.className = "participant-item";
      item.id = `participant-${socketId}`;

      const initial = userName.charAt(0).toUpperCase();

      item.innerHTML = `
        <div class="participant-avatar">${initial}</div>
        <div class="participant-info">
          <div class="participant-name">${userName} ${isLocal ? "(You)" : ""}</div>
          <div class="participant-status">In meeting</div>
        </div>
        <div class="participant-icons">
          <span class="p-icon active" id="pmic-${socketId}"><i class="fas fa-microphone"></i></span>
          <span class="p-icon active" id="pvid-${socketId}"><i class="fas fa-video"></i></span>
        </div>
      `;
      els.participantsList.appendChild(item);
    }

    function removeParticipant(socketId) {
      const item = document.getElementById(`participant-${socketId}`);
      if (item) item.remove();
    }

    // ── Socket Events ───────────────────────────────
    socket.on("existing-users", (users) => {
      users.forEach(({ socketId, userName }) => {
        state.peerNames.set(socketId, userName);
        addRemoteTile(socketId, userName);
        addParticipant(socketId, userName);
        const pc = createPeer(socketId, true);
        state.peers.set(socketId, pc);
      });
    });

    socket.on("user-joined", ({ socketId, userName }) => {
      state.peerNames.set(socketId, userName);
      addRemoteTile(socketId, userName);
      addParticipant(socketId, userName);
      createPeer(socketId, false);
      showToast(`${userName} joined`, "success");
      appendSystemMessage(`${userName} joined the meeting`);
    });

    socket.on("offer", async ({ from, offer, userName }) => {
      let pc = state.peers.get(from);
      if (!pc) {
        state.peerNames.set(from, userName);
        pc = createPeer(from, false);
        state.peers.set(from, pc);
      }
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit("answer", { to: from, from: socket.id, answer });
    });

    socket.on("answer", async ({ from, answer }) => {
      const pc = state.peers.get(from);
      if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
    });

    socket.on("ice-candidate", async ({ from, candidate }) => {
      const pc = state.peers.get(from);
      if (pc && candidate) {
        try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); }
        catch (e) { console.warn("ICE error:", e); }
      }
    });

    socket.on("user-left", ({ socketId, userName }) => {
      removeRemoteTile(socketId);
      removeParticipant(socketId);
      const name = userName || state.peerNames.get(socketId) || "Someone";
      showToast(`${name} left`, "info");
      appendSystemMessage(`${name} left the meeting`);
    });

    socket.on("media-state", ({ socketId, video, audio }) => {
      const micEl = document.getElementById(`mic-${socketId}`);
      const pmicEl = document.getElementById(`pmic-${socketId}`);
      const pvidEl = document.getElementById(`pvid-${socketId}`);
      const noVideoEl = document.getElementById(`noVideo-${socketId}`);
      const tile = document.getElementById(`tile-${socketId}`);

      if (micEl) {
        micEl.className = `indicator ${audio ? "" : "muted"}`;
        micEl.innerHTML = `<i class="fas fa-microphone${audio ? "" : "-slash"}"></i>`;
      }
      if (pmicEl) pmicEl.className = `p-icon ${audio ? "active" : "muted"}`;
      if (pvidEl) pvidEl.className = `p-icon ${video ? "active" : "muted"}`;
      if (noVideoEl) noVideoEl.style.display = video ? "none" : "flex";
      if (tile) {
        const v = tile.querySelector("video");
        if (v) v.style.display = video ? "block" : "none";
      }
    });

    socket.on("screen-share-started", ({ socketId, userName }) => {
      showToast(`${userName} is sharing their screen`, "info");
      appendSystemMessage(`${userName} started screen sharing`);
    });

    socket.on("screen-share-stopped", ({ socketId }) => {
      const name = state.peerNames.get(socketId) || "Someone";
      showToast(`${name} stopped screen sharing`, "info");
    });

    socket.on("chat-message", ({ message, userName, time, id }) => {
      appendChatMessage(message, userName, time, id === socket.id);
    });

    socket.on("raise-hand", ({ socketId, userName }) => {
      showRaiseHand(userName);
    });

    socket.on("youtube-url", ({ url, from }) => {
      showYouTubePanel();
      els.ytUrlInput.value = url;
      loadYouTubeVideo(url);
      showToast(`${from} loaded a YouTube video`, "info");
    });

    socket.on("youtube-play", ({ time }) => {
      if (state.ytPlayer && state.ytPlayerReady) {
        state.ytSyncing = true;
        state.ytPlayer.seekTo(time, true);
        state.ytPlayer.playVideo();
        setTimeout(() => { state.ytSyncing = false; }, 1000);
      }
    });

    socket.on("youtube-pause", ({ time }) => {
      if (state.ytPlayer && state.ytPlayerReady) {
        state.ytSyncing = true;
        state.ytPlayer.seekTo(time, true);
        state.ytPlayer.pauseVideo();
        setTimeout(() => { state.ytSyncing = false; }, 1000);
      }
    });

    socket.on("youtube-seek", ({ time }) => {
      if (state.ytPlayer && state.ytPlayerReady) {
        state.ytSyncing = true;
        state.ytPlayer.seekTo(time, true);
        setTimeout(() => { state.ytSyncing = false; }, 1000);
      }
    });

    // ── Audio Toggle ────────────────────────────────
    function toggleAudio() {
      state.isAudioMuted = !state.isAudioMuted;
      state.localStream.getAudioTracks().forEach((t) => {
        t.enabled = !state.isAudioMuted;
      });

      const btn = els.toggleAudioBtn;
      const icon = btn.querySelector("i");
      const label = btn.querySelector("span");

      if (state.isAudioMuted) {
        icon.className = "fas fa-microphone-slash";
        label.textContent = "Unmute";
        btn.classList.add("inactive");
        els.localMicIndicator.className = "indicator muted";
        els.localMicIndicator.innerHTML = `<i class="fas fa-microphone-slash"></i>`;
      } else {
        icon.className = "fas fa-microphone";
        label.textContent = "Mute";
        btn.classList.remove("inactive");
        els.localMicIndicator.className = "indicator";
        els.localMicIndicator.innerHTML = `<i class="fas fa-microphone"></i>`;
      }

      socket.emit("media-state", {
        roomId: state.roomId,
        video: !state.isVideoOff,
        audio: !state.isAudioMuted,
      });
    }

    // ── Video Toggle ────────────────────────────────
    function setVideoOff(off) {
      state.isVideoOff = off;
      state.localStream.getVideoTracks().forEach((t) => {
        t.enabled = !off;
      });

      const btn = els.toggleVideoBtn;
      const icon = btn.querySelector("i");
      const label = btn.querySelector("span");
      els.localNoVideo.style.display = off ? "flex" : "none";
      els.localVideo.style.display = off ? "none" : "block";

      if (off) {
        icon.className = "fas fa-video-slash";
        label.textContent = "Start Video";
        btn.classList.add("inactive");
      } else {
        icon.className = "fas fa-video";
        label.textContent = "Stop Video";
        btn.classList.remove("inactive");
      }

      socket.emit("media-state", {
        roomId: state.roomId,
        video: !state.isVideoOff,
        audio: !state.isAudioMuted,
      });
    }

    function toggleVideo() {
      setVideoOff(!state.isVideoOff);
    }

    // ── Screen Share ─────────────────────────────────
    async function toggleScreenShare() {
      if (state.isSharingScreen) {
        stopScreenShare();
        return;
      }

      try {
        state.screenStream = await navigator.mediaDevices.getDisplayMedia({
          video: { cursor: "always" },
          audio: true,
        });

        const videoTrack = state.screenStream.getVideoTracks()[0];

        state.peers.forEach((pc) => {
          const sender = pc.getSenders().find((s) => s.track && s.track.kind === "video");
          if (sender) sender.replaceTrack(videoTrack);
        });

        const prevStream = els.localVideo.srcObject;
        els.localVideo.srcObject = state.screenStream;

        videoTrack.onended = () => {
          stopScreenShare(prevStream);
        };

        state.isSharingScreen = true;
        els.screenShareBtn.classList.add("active");
        els.screenShareBtn.querySelector("span").textContent = "Stop Share";
        socket.emit("screen-share-started", { roomId: state.roomId, userName: state.userName });
        showToast("Screen sharing started", "success");
      } catch (err) {
        if (err.name !== "NotAllowedError") {
          showToast("Could not start screen share", "error");
        }
      }
    }

    function stopScreenShare(prevStream) {
      if (!state.isSharingScreen) return;

      const camTrack = state.localStream.getVideoTracks()[0];

      state.peers.forEach((pc) => {
        const sender = pc.getSenders().find((s) => s.track && s.track.kind === "video");
        if (sender && camTrack) sender.replaceTrack(camTrack);
      });

      els.localVideo.srcObject = state.localStream;
      if (state.screenStream) {
        state.screenStream.getTracks().forEach((t) => t.stop());
        state.screenStream = null;
      }

      state.isSharingScreen = false;
      els.screenShareBtn.classList.remove("active");
      els.screenShareBtn.querySelector("span").textContent = "Share Screen";
      socket.emit("screen-share-stopped", { roomId: state.roomId });
      showToast("Screen sharing stopped", "info");
    }

    // ── Recording ───────────────────────────────────
    async function toggleRecording() {
      if (state.isRecording) {
        stopRecording();
        return;
      }
      await startRecording();
    }

    async function startRecording() {
      try {
        const canvas = document.createElement("canvas");
        canvas.width = 1280;
        canvas.height = 720;
        const ctx = canvas.getContext("2d");

        const audioCtx = new AudioContext();
        const destination = audioCtx.createMediaStreamDestination();

        if (state.localStream.getAudioTracks().length > 0) {
          const src = audioCtx.createMediaStreamSource(state.localStream);
          src.connect(destination);
        }

        state.peerStreams.forEach((stream) => {
          if (stream.getAudioTracks().length > 0) {
            try {
              const src = audioCtx.createMediaStreamSource(stream);
              src.connect(destination);
            } catch (e) {}
          }
        });

        function drawFrame() {
          if (!state.isRecording) return;

          ctx.fillStyle = "#0d0d14";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const videos = document.querySelectorAll(".video-tile video");
          const count = videos.length;
          if (count === 0) { requestAnimationFrame(drawFrame); return; }

          const cols = count === 1 ? 1 : 2;
          const rows = Math.ceil(count / cols);
          const w = canvas.width / cols;
          const h = canvas.height / rows;

          videos.forEach((v, i) => {
            const col = i % cols;
            const row = Math.floor(i / cols);
            try {
              ctx.drawImage(v, col * w, row * h, w, h);
            } catch (e) {}
          });

          requestAnimationFrame(drawFrame);
        }
        requestAnimationFrame(drawFrame);

        const canvasStream = canvas.captureStream(30);
        const combined = new MediaStream([
          ...canvasStream.getVideoTracks(),
          ...destination.stream.getAudioTracks(),
        ]);

        const mimeType = MediaRecorder.isTypeSupported("video/webm;codecs=vp9,opus")
          ? "video/webm;codecs=vp9,opus"
          : "video/webm";

        state.mediaRecorder = new MediaRecorder(combined, { mimeType });
        state.recordedChunks = [];

        state.mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) state.recordedChunks.push(e.data);
        };

        state.mediaRecorder.onstop = () => {
          const blob = new Blob(state.recordedChunks, { type: "video/webm" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          const dateStr = new Date().toISOString().slice(0, 19).replace(/:/g, "-");
          a.download = `NexMeet-Recording-${dateStr}.webm`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast("Recording saved to your device!", "success", 4000);
          audioCtx.close();
        };

        state.mediaRecorder.start(1000);
        state.isRecording = true;

        els.recordBtn.classList.add("recording");
        els.recordBtn.querySelector("i").className = "fas fa-stop-circle";
        els.recordBtn.querySelector("span").textContent = "Stop Rec";
        els.recordingIndicator.style.display = "flex";
        showToast("Recording started", "success");
        appendSystemMessage("Recording started");

      } catch (err) {
        console.error("Recording error:", err);
        showToast("Failed to start recording", "error");
      }
    }

    function stopRecording() {
      if (state.mediaRecorder && state.isRecording) {
        state.mediaRecorder.stop();
        state.isRecording = false;
        els.recordBtn.classList.remove("recording");
        els.recordBtn.querySelector("i").className = "fas fa-record-vinyl";
        els.recordBtn.querySelector("span").textContent = "Record";
        els.recordingIndicator.style.display = "none";
        appendSystemMessage("Recording stopped");
      }
    }

    // ── Chat ────────────────────────────────────────
    function sendMessage() {
      const text = els.chatInput.value.trim();
      if (!text) return;
      socket.emit("chat-message", { roomId: state.roomId, message: text, userName: state.userName });
      els.chatInput.value = "";
    }

    function appendChatMessage(message, userName, time, isOwn = false) {
      const welcomeMsg = els.chatMessages.querySelector(".chat-welcome");
      if (welcomeMsg) welcomeMsg.remove();

      const div = document.createElement("div");
      div.className = `chat-msg ${isOwn ? "own" : ""}`;
      div.innerHTML = `
        <div class="chat-msg-header">
          <span class="chat-msg-name ${isOwn ? "own" : ""}">${userName}</span>
          <span class="chat-msg-time">${time}</span>
        </div>
        <div class="chat-msg-bubble">${escapeHtml(message)}</div>
      `;
      els.chatMessages.appendChild(div);
      els.chatMessages.scrollTop = els.chatMessages.scrollHeight;

      if (!isOwn && !state.sidebarOpen) {
        state.unreadCount++;
        els.unreadBadge.textContent = state.unreadCount;
        els.unreadBadge.style.display = "flex";
      }
    }

    function appendSystemMessage(text) {
      const div = document.createElement("div");
      div.style.cssText = "text-align:center;font-size:11px;color:rgba(255,255,255,0.3);padding:4px 0;";
      div.textContent = text;
      els.chatMessages.appendChild(div);
      els.chatMessages.scrollTop = els.chatMessages.scrollHeight;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ── Raise Hand ──────────────────────────────────
    function raiseHand() {
      socket.emit("raise-hand", { roomId: state.roomId, userName: state.userName });
      showRaiseHand(state.userName + " (You)");
      els.raiseHandBtn.classList.add("active");
      setTimeout(() => els.raiseHandBtn.classList.remove("active"), 3000);
    }

    function showRaiseHand(userName) {
      els.raiseHandText.textContent = `${userName} raised their hand ✋`;
      els.raiseHandPopup.style.display = "flex";
      setTimeout(() => { els.raiseHandPopup.style.display = "none"; }, 4000);
    }

    // ── YouTube Panel ────────────────────────────────
    function showYouTubePanel() {
      els.youtubePanel.style.display = "flex";
      els.youtubePanelBtn.classList.add("active");
    }

    function hideYouTubePanel() {
      els.youtubePanel.style.display = "none";
      els.youtubePanelBtn.classList.remove("active");
    }

    function extractYouTubeId(url) {
      const match = url.match(
        /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/ ]{11})/
      );
      return match ? match[1] : null;
    }

    function loadYouTubeVideo(url) {
      const videoId = extractYouTubeId(url);
      if (!videoId) {
        showToast("Invalid YouTube URL", "error");
        return;
      }

      els.ytPlaceholder.style.display = "none";

      if (state.ytPlayer && state.ytPlayerReady) {
        state.ytPlayer.loadVideoById(videoId);
      } else {
        state.ytPlayer = new YT.Player("ytPlayer", {
          videoId,
          playerVars: { autoplay: 0, modestbranding: 1, rel: 0 },
          events: {
            onReady: () => {
              state.ytPlayerReady = true;
              showToast("YouTube video loaded", "success");
            },
            onStateChange: (event) => {
              if (state.ytSyncing) return;
              if (event.data === YT.PlayerState.PLAYING) {
                socket.emit("youtube-play", { roomId: state.roomId, time: state.ytPlayer.getCurrentTime() });
              } else if (event.data === YT.PlayerState.PAUSED) {
                socket.emit("youtube-pause", { roomId: state.roomId, time: state.ytPlayer.getCurrentTime() });
              }
            },
          },
        });
      }
    }

    // ── Sidebar ─────────────────────────────────────
    function toggleSidebar() {
      state.sidebarOpen = !state.sidebarOpen;
      els.sidebar.classList.toggle("collapsed", !state.sidebarOpen);

      if (state.sidebarOpen) {
        state.unreadCount = 0;
        els.unreadBadge.style.display = "none";
        els.sidebarToggleBtn.classList.add("active");
      } else {
        els.sidebarToggleBtn.classList.remove("active");
      }
    }

    function switchTab(tab) {
      document.querySelectorAll(".sidebar-tab").forEach((t) => t.classList.remove("active"));
      document.querySelectorAll(".sidebar-content").forEach((p) => p.classList.remove("active"));

      if (tab === "chat") {
        els.chatTab.classList.add("active");
        els.chatPanel.classList.add("active");
        state.unreadCount = 0;
        els.unreadBadge.style.display = "none";
      } else {
        els.participantsTab.classList.add("active");
        els.participantsPanel.classList.add("active");
      }
    }

    // ── Leave Room ───────────────────────────────────
    function leaveRoom() {
      stopRecording();
      if (state.screenStream) state.screenStream.getTracks().forEach((t) => t.stop());
      if (state.localStream) state.localStream.getTracks().forEach((t) => t.stop());
      clearInterval(state.timerInterval);
      state.peers.forEach((pc) => pc.close());
      socket.disconnect();
      window.location.href = "/";
    }

    // ── Toast ────────────────────────────────────────
    function showToast(msg, type = "info", duration = 3000) {
      els.toast.textContent = msg;
      els.toast.className = `toast show ${type}`;
      setTimeout(() => { els.toast.className = "toast"; }, duration);
    }

    // ── Copy Room Code ───────────────────────────────
    els.copyRoomCode.addEventListener("click", () => {
      navigator.clipboard.writeText(state.roomId).then(() => {
        showToast("Room code copied!", "success");
      });
    });

    // ── Event Listeners ──────────────────────────────
    els.toggleAudioBtn.addEventListener("click", toggleAudio);
    els.toggleVideoBtn.addEventListener("click", toggleVideo);
    els.screenShareBtn.addEventListener("click", toggleScreenShare);
    els.youtubePanelBtn.addEventListener("click", () => {
      if (els.youtubePanel.style.display === "none") showYouTubePanel();
      else hideYouTubePanel();
    });
    els.recordBtn.addEventListener("click", toggleRecording);
    els.raiseHandBtn.addEventListener("click", raiseHand);
    els.sidebarToggleBtn.addEventListener("click", toggleSidebar);
    els.leaveBtn.addEventListener("click", () => {
      els.modalOverlay.style.display = "flex";
    });
    els.cancelLeave.addEventListener("click", () => {
      els.modalOverlay.style.display = "none";
    });
    els.confirmLeave.addEventListener("click", leaveRoom);

    els.chatSendBtn.addEventListener("click", sendMessage);
    els.chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    els.ytLoadBtn.addEventListener("click", () => {
      const url = els.ytUrlInput.value.trim();
      if (!url) { showToast("Please enter a YouTube URL", "error"); return; }
      loadYouTubeVideo(url);
      socket.emit("youtube-url", { roomId: state.roomId, url });
    });

    els.ytCloseBtn.addEventListener("click", hideYouTubePanel);

    els.chatTab.addEventListener("click", () => switchTab("chat"));
    els.participantsTab.addEventListener("click", () => switchTab("participants"));

    // ── YouTube iframe API Callback ──────────────────
    window.onYouTubeIframeAPIReady = () => {
      // API is ready; player will be created when a video is loaded
    };

    // ── Start ─────────────────────────────────────────
    init();
  </script>
</body>
</html>
